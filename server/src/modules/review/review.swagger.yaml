/review:
  post:
    tags: [Review Management]
    summary: Create a new review
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../../openapi/components/schemas.yaml#/ReviewInput"
    responses:
      '201':
        description: Review created successfully
        content:
          application/json:
            schema:
              $ref: "../../openapi/components/schemas.yaml#/ReviewResponse"
      '400':
        description: Invalid input
      '401':
        description: Unauthorized
  put:
    tags: [Review Management]
    summary: Update an existing review
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../../openapi/components/schemas.yaml#/ReviewInput" # Assuming the same input for update
    responses:
      '200':
        description: Review updated successfully
        content:
          application/json:
            schema:
              $ref: "../../openapi/components/schemas.yaml#/ReviewResponse"
      '400':
        description: Invalid input
      '401':
        description: Unauthorized
      '404':
        description: Review not found
/review/service/{serviceId}:
  get:
    tags: [Review Queries]
    summary: Get reviews by service ID
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: serviceId
        schema:
          type: string
        required: true
        description: Hashed ID of the service
    responses:
      '200':
        description: List of reviews for the service
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../../openapi/components/schemas.yaml#/ReviewResponse"
      '401':
        description: Unauthorized
      '404':
        description: Service not found
/review/serviceUser/{serviceId}:
  get:
    tags: [Review Queries]
    summary: Get reviews by service ID for a specific user (their own review)
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: serviceId
        schema:
          type: string
        required: true
        description: Hashed ID of the service
    responses:
      '200':
        description: User's review for the service (or null if not found)
        content:
          application/json:
            schema:
              $ref: "../../openapi/components/schemas.yaml#/ReviewResponse"
      '401':
        description: Unauthorized
      '404':
        description: Service not found or user has no review
