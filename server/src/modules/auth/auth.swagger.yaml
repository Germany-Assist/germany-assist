# Auth Module - Handles Google OAuth, Login, and Session Management
/auth/google:
  post:
    tags: [Authentication]
    summary: Google OAuth Login
    description: Exchange a Google Credential token for a session. Sets a refreshToken cookie.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              credential:
                { type: string, description: "The ID token from Google" }
    responses:
      200:
        description: Success - Returns access token and user data.
      201:
        description: Created - New user registered via Google.

/auth/verifyAccount:
  get:
    tags: [Authentication]
    summary: Verify Email Account
    description: Validates the token sent via email. Redirects to Frontend.
    parameters:
      - name: token
        in: query
        required: true
        schema: { type: string }
    responses:
      302:
        description: Redirect to /verified?status=success

/auth/login:
  post:
    tags: [Authentication]
    summary: Login with Email/Password
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email, password]
            properties:
              email: { type: string, format: email }
              password: { type: string, format: password }
    responses:
      200:
        description: Login Successful
      401:
        description: Invalid credentials
  get:
    tags: [Authentication]
    summary: Login via Token (Auto-login)
    security:
      - bearerAuth: []
    responses:
      200:
        description: Returns sanitized user object

/auth/profile:
  get:
    tags: [Authentication]
    summary: Get User Profile
    security:
      - bearerAuth: []
    responses:
      200:
        description: Returns the full user profile (mapped)

/auth/refresh-token:
  post:
    tags: [Authentication]
    summary: Refresh Access Token
    description: Reads the refreshToken from HttpOnly cookies and generates a new Access Token.
    responses:
      200:
        description: New access token generated
      401:
        description: Missing or invalid refresh token cookie

/auth/logout:
  get:
    tags: [Authentication]
    summary: Logout
    description: Clears the refreshToken cookie.
    responses:
      200:
        description: Cookie cleared

/auth/admin/verify/{id}:
  get:
    tags: [Admin Actions]
    summary: Manual User Verification (Admin Only)
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        description: The hashed user ID
        schema: { type: string }
    responses:
      200:
        description: User verified manually
      403:
        description: Forbidden - Requires admin roles

/auth/changePassword:
  put:
    tags: [Authentication]
    summary: Change Password
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [password, newPassword]
            properties:
              password: { type: string, format: password }
              newPassword: { type: string, format: password }
    responses:
      200:
        description: Password changed

/auth/password-reset:
  post:
    tags: [Authentication]
    summary: Request Password Reset
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [email]
            properties:
              email: { type: string, format: email }
    responses:
      200:
        description: Password reset email sent

/auth/password-reset/confirm:
  post:
    tags: [Authentication]
    summary: Confirm Password Reset
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [token, password]
            properties:
              token: { type: string }
              password: { type: string, format: password }
    responses:
      200:
        description: Password reset successful
