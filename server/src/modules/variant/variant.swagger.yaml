/variant/provider/archiveVariant/{id}:
  put:
    tags: [Variant Management]
    summary: Archive a variant (Provider)
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
        description: Hashed ID of the variant to archive
    responses:
      '200':
        description: Variant archived successfully
        content:
          application/json:
            schema:
              $ref: '../../openapi/components/schemas.yaml#/SuccessResponse'
      '401':
        description: Unauthorized
      '403':
        description: Forbidden
      '404':
        description: Variant not found
/variant/provider/createNewVariant:
  post:
    tags: [Variant Management]
    summary: Create a new variant (Provider)
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../openapi/components/schemas.yaml#/VariantInput'
    responses:
      '201':
        description: Variant created successfully
        content:
          application/json:
            schema:
              $ref: '../../openapi/components/schemas.yaml#/VariantResponse'
      '400':
        description: Invalid input
      '401':
        description: Unauthorized
      '403':
        description: Forbidden
