/service/client/favorite/{id}:
  put:
    tags: [Service]
    summary: Add service to favorites (Client)
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
        description: Hashed ID of the service to add to favorites
    responses:
      "200":
        description: Service added to favorites successfully
        content:
          application/json:
            schema:
              $ref: "../../openapi/components/schemas.yaml#/SuccessResponse"
      "401":
        description: Unauthorized
      "404":
        description: Service not found
  delete:
    tags: [Service]
    summary: Remove service from favorites (Client)
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
        description: Hashed ID of the service to remove from favorites
    responses:
      "200":
        description: Service removed from favorites successfully
        content:
          application/json:
            schema:
              $ref: "../../openapi/components/schemas.yaml#/SuccessResponse"
      "401":
        description: Unauthorized
      "404":
        description: Service not found
/service/client/services:
  get:
    tags: [Service]
    summary: Get client's services
    security:
      - bearerAuth: []
    responses:
      "200":
        description: List of services for the client
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../../openapi/components/schemas.yaml#/ServiceResponse"
      "401":
        description: Unauthorized
